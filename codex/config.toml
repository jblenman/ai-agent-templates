# Codex CLI — Recommended config.toml
# https://github.com/jblenman/ai-agent-templates
#
# Goal: Claude Code-like reasoning and autonomy, maximum local context/history/memory,
# minimal outbound noise. Drop this in ~/.codex/config.toml and adjust to taste.
#
# Tuned for GPT-5.5 (May 2026). For older models, see profiles/.
#
# Docs: https://developers.openai.com/codex/config-reference/
#
# ⚠ TOML ORDERING: All root-level keys MUST appear before any [table] headers.
# A key placed after a [table] header is parsed as part of that table, not the root,
# and will be silently ignored. Keep all plain key = value lines above [sections].

# ── Global ────────────────────────────────────────────────────────────────────
model = "gpt-5.5"                      # daily driver. Override per-project in .codex/config.toml

suppress_unstable_features_warning = true
check_for_update_on_startup = false
web_search = "disabled"                # Azure orgs typically reject web_search_preview anyway. Must be root-level
approval_policy = "untrusted"          # auto-approves safe read-only ops; still prompts for writes/exec
                                       # "on-request" = model decides (asks too much)
                                       # "never" = no prompts at all (use for fully trusted sessions)
sandbox_mode = "workspace-write"       # write freely within project, read anywhere

# ── Model & Reasoning (GPT-5.5 tuning) ────────────────────────────────────────
# OpenAI's Codex prompting guide explicitly recommends "medium" for interactive coding.
# Higher effort can REGRESS quality with weak stopping criteria or open-ended tools.
# Live-tune in TUI with Alt+, (lower) and Alt+. (higher) on Codex v0.124.0+.
model_reasoning_effort = "medium"      # raise to "high" only with eval evidence
model_reasoning_summary = "auto"       # 5.5 is concise enough — no need to force "detailed"
model_verbosity = "low"                # explicit low for coding work
personality = "pragmatic"              # none/friendly/pragmatic — direct, no fluff

plan_mode_reasoning_effort = "high"    # reasoning level during plan/explore phase
review_model = "gpt-5-mini"            # cheaper model for the /review command

# ── Context — capped at the 272K pricing cliff ────────────────────────────────
# GPT-5.5 charges 2× input / 1.5× output once a single prompt crosses 272K input tokens.
# Compact early to avoid the surcharge. Raise this only if you need the headroom.
model_auto_compact_token_limit = 270000
tool_output_token_limit = 32000        # more tool output kept in context (default is much lower)
project_doc_max_bytes = 65536          # read up to 64KB of AGENTS.md

# Reuse .claude/CLAUDE.md if no AGENTS.md exists — avoids duplicating instructions
# across Claude Code and Codex CLI projects
project_doc_fallback_filenames = [".claude/CLAUDE.md", "CLAUDE.md"]

# ── Approval & Sandbox ────────────────────────────────────────────────────────
# approval_policy and sandbox_mode are set in the Global section above.
# For fully trusted sessions use: codex --full-auto
# To bypass everything for a session: codex --yolo

# ── Outbound Privacy ──────────────────────────────────────────────────────────
# check_for_update_on_startup and web_search are set in the Global section above.
# Azure: if you get "Tool 'web_search_preview' disabled for this organization",
# web_search = "disabled" is required at root level. Placing it after any [table]
# header causes it to be silently ignored.

[analytics]
enabled = false

[feedback]
enabled = false

# ── Local History — keep everything ───────────────────────────────────────────
[history]
persistence = "save-all"
max_bytes = 209715200                  # 200MB

# ── Cross-session Memory ──────────────────────────────────────────────────────
[memories]
generate_memories = true
use_memories = true
max_rollout_age_days = 90
max_unused_days = 60
min_rollout_idle_hours = 6
max_raw_memories_for_consolidation = 512
no_memories_if_mcp_or_web_search = false

# ── Features ──────────────────────────────────────────────────────────────────
[features]
# If Azure rejects web_search_preview ("Tool disabled for this organization"),
# set web_search = false here AND web_search = "disabled" at the top level.
# The top-level mode controls fetch behavior; this controls API tool registration.
# web_search = false
undo = true                # git snapshot at each turn — enables per-step undo
multi_agent = true         # spawn parallel sub-agents for larger tasks
child_agents_md = true     # sub-agents inherit AGENTS.md coaching (critical — off by default)
memories = true            # enable cross-session memory subsystem above
prevent_idle_sleep = true  # keep system awake during long tasks
js_repl = true             # persistent Node-backed JS REPL
request_permissions = true # model can request more FS permissions without leaving sandbox
codex_git_commit = true    # git commit attribution guidance
personality = true         # required to enable the personality setting above

# ── Shell Environment ─────────────────────────────────────────────────────────
[shell_environment_policy]
inherit = "all"            # pass full environment to shell processes
                           # use "core" or "none" in security-sensitive environments

# ── TUI ───────────────────────────────────────────────────────────────────────
[tui]
animations = false
show_tooltips = false
status_line = [
  "model-with-reasoning",  # model name + reasoning effort level
  "context-remaining",     # % of context window remaining
  "git-branch",            # current git branch
  "used-tokens",           # tokens used this session
]

# ── Profiles — quick switching with: codex --profile <name> ───────────────────
[profiles.fast]
# Low-friction mode for quick tasks
model = "gpt-5-mini"
model_reasoning_effort = "low"
approval_policy = "never"

[profiles.deep]
# Higher reasoning for hard design/audit work — same base model, deeper budget
model_reasoning_effort = "high"        # "xhigh" only with eval evidence — can regress otherwise
model_reasoning_summary = "detailed"
plan_mode_reasoning_effort = "high"
